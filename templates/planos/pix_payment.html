<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX Gerado | Vale & Feira</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f5f7fa; padding: 20px; }
        .pix-container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        
        .qr-box {
            background: #ffffff; padding: 30px; border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05); text-align: center; margin-bottom: 30px;
        }

        .check-icon { font-size: 4rem; color: #2e7d32; display: block; margin-bottom: 10px; }
        
        .btn-confirmar {
            background-color: #2e7d32; color: white; padding: 15px; border: none;
            border-radius: 30px; font-weight: 700; font-size: 1.1rem; width: 100%;
            cursor: pointer; text-decoration: none; display: block; transition: 0.3s; margin-top: 20px;
        }
        .btn-confirmar:hover { background-color: #1b5e20; }
        
        .input-copy-group { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <main class="pix-container">
        <div style="text-align: center; margin-bottom: 30px;">
            <span class="check-icon">✅</span>
            <h1 style="color: #2e7d32; font-size: 1.8rem; margin: 0;">PIX Gerado!</h1>
            <p style="color: #666;">Pague para liberar seu plano <strong>imediatamente</strong>.</p>
        </div>

        <div class="qr-box">
            
            <div style="margin: 0 auto 20px; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center;">
                {% if qr_imagem %}
                    <img src="data:image/jpeg;base64,{{ qr_imagem }}" 
                         alt="QR Code PIX" 
                         style="width: 100%; border-radius: 10px; border: 2px solid #2e7d32;">
                {% else %}
                    <p style="color: #888;">Use o código Copia e Cola abaixo.</p>
                {% endif %}
            </div>
            
            <div style="text-align: left;">
                <label style="font-weight: 600; color: #555;">Copia e Cola:</label>
                <div class="input-copy-group">
                    <input type="text" id="pixCode" value="{{ pagamento.dados_qr_code }}" readonly 
                           style="flex-grow: 1; padding: 12px; border: 2px solid #eee; border-radius: 10px; background: #f8f9fa;">
                    <button onclick="copyPixCode()" id="btnCopy" 
                            style="background: #2e7d32; color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: 700;">
                        Copiar
                    </button>
                </div>
            </div>

            <p style="margin-top: 20px; color: #555; font-size: 1.2rem; font-weight: bold;">
                Valor: R$ {{ "%.2f"|format(pagamento.valor)|replace('.', ',') }}
            </p>

            <a href="{{ url_for('planos.confirmar_pix', id_pagamento=pagamento.id) }}" class="btn-confirmar">
                Já fiz o pagamento
            </a>
        </div>
    </main>

    <script>
        function copyPixCode() {
            const pixInput = document.getElementById('pixCode');
            const btn = document.getElementById('btnCopy');
            pixInput.select();
            pixInput.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(pixInput.value);
            btn.innerText = 'Copiado!';
            setTimeout(() => { btn.innerText = 'Copiar'; }, 2000);
        }
    </script>
</body>
</html>
